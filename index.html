<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새로운 AI의 시작 - 2027년 1월 1일 Grand Open</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060608;
            --surface: #0e0e12;
            --border: #1a1a22;
            --text: #e8e8ec;
            --muted: #6b6b7a;
            --accent: #a855f7;
            --accent-light: #c084fc;
            --glow: rgba(168, 85, 247, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Glow */
        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 800px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Noise Texture */
        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-light);
            margin-bottom: 2rem;
            letter-spacing: 0.3em;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        h1 span {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 50%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 4rem;
            font-weight: 400;
        }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 4rem;
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .unit:not(:last-child)::after {
            content: ':';
            position: absolute;
            right: -1rem;
            top: 0.5rem;
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .unit-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 600;
            line-height: 1;
            color: var(--text);
            letter-spacing: -0.02em;
            min-width: 80px;
        }

        .unit-label {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 0.75rem;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
            box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 48px rgba(168, 85, 247, 0.45);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            background: rgba(168, 85, 247, 0.1);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--muted);
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .countdown {
                gap: 0.75rem;
            }
            .unit:not(:last-child)::after {
                right: -0.5rem;
                font-size: 1.8rem;
            }
            .unit-value {
                min-width: 55px;
            }
            .actions {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="noise"></div>

    <div class="content">
        <div class="label">2027년 1월 1일 Grand Open</div>
        <h1><span>이젠 나만을 위한 AI를 즐겨라.</span></h1>
        <p class="subtitle"> </p>

        <div class="countdown" id="countdown">
            <div class="unit">
                <div class="unit-value" id="days">--</div>
                <div class="unit-label">Days</div>
            </div>
            <div class="unit">
                <div class="unit-value" id="hours">--</div>
                <div class="unit-label">Hours</div>
            </div>
            <div class="unit">
                <div class="unit-value" id="minutes">--</div>
                <div class="unit-label">Minutes</div>
            </div>
            <div class="unit">
                <div class="unit-value" id="seconds">--</div>
                <div class="unit-label">Seconds</div>
            </div>
        </div>

        <div class="actions">

        </div>
    </div>

    <div class="footer">© 2026</div>

    <script>
        const TARGET = new Date('2027-01-01T00:00:00+09:00').getTime();

        function pad(n) {
            return n.toString().padStart(2, '0');
        }

        function tick() {
            const now = Date.now();
            const diff = TARGET - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = 
                    '<div style="font-size:2rem;font-weight:700;color:#c084fc;">🎉 2027년이 시작되었습니다!</div>';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = pad(days);
            document.getElementById('hours').textContent = pad(hours);
            document.getElementById('minutes').textContent = pad(minutes);
            document.getElementById('seconds').textContent = pad(seconds);
        }

        // Blink colon effect
        let colonVisible = true;
        function blinkColons() {
            const separators = document.querySelectorAll('.unit:not(:last-child)::after');
            // CSS animation handles this
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
